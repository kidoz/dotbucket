services:
  dotbucket-1:
    build: .
    container_name: dotbucket-1
    ports:
      - "9001:9000" # S3 API & Dashboard
    volumes:
      - dotbucket-data-1:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # IMPORTANT: Replace these with strong, unique values before deploying.
      # Generate a secure token: openssl rand -hex 32
      - Auth__AdminToken=${DOTBUCKET_ADMIN_TOKEN:?Set DOTBUCKET_ADMIN_TOKEN}
      - Auth__RootAccessKey=${DOTBUCKET_ROOT_ACCESS_KEY:?Set DOTBUCKET_ROOT_ACCESS_KEY}
      - Auth__RootSecretKey=${DOTBUCKET_ROOT_SECRET_KEY:?Set DOTBUCKET_ROOT_SECRET_KEY}
      - Cluster__Enabled=true
      - Cluster__NodeId=node-1
      - Cluster__AdvertiseAddress=http://dotbucket-1:9000
      - Cluster__LeaderNodeId=node-1
      - Cluster__ClusterToken=${DOTBUCKET_CLUSTER_TOKEN:?Set DOTBUCKET_CLUSTER_TOKEN}
      - Cluster__ReplicationFactor=3
      - Cluster__WriteQuorum=2
      - Cluster__ReadQuorum=1
      - "Cluster__Nodes__0__NodeId=node-1"
      - "Cluster__Nodes__0__Address=http://dotbucket-1:9000"
      - "Cluster__Nodes__1__NodeId=node-2"
      - "Cluster__Nodes__1__Address=http://dotbucket-2:9000"
      - "Cluster__Nodes__2__NodeId=node-3"
      - "Cluster__Nodes__2__Address=http://dotbucket-3:9000"
      # Generate a 32-byte key: openssl rand -base64 32
      - Storage__MasterKey=${DOTBUCKET_MASTER_KEY:?Set DOTBUCKET_MASTER_KEY}
    networks:
      - dotbucket-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  dotbucket-2:
    build: .
    container_name: dotbucket-2
    ports:
      - "9002:9000"
    volumes:
      - dotbucket-data-2:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Auth__AdminToken=${DOTBUCKET_ADMIN_TOKEN:?Set DOTBUCKET_ADMIN_TOKEN}
      - Auth__RootAccessKey=${DOTBUCKET_ROOT_ACCESS_KEY:?Set DOTBUCKET_ROOT_ACCESS_KEY}
      - Auth__RootSecretKey=${DOTBUCKET_ROOT_SECRET_KEY:?Set DOTBUCKET_ROOT_SECRET_KEY}
      - Cluster__Enabled=true
      - Cluster__NodeId=node-2
      - Cluster__AdvertiseAddress=http://dotbucket-2:9000
      - Cluster__LeaderNodeId=node-1
      - Cluster__ClusterToken=${DOTBUCKET_CLUSTER_TOKEN:?Set DOTBUCKET_CLUSTER_TOKEN}
      - Cluster__ReplicationFactor=3
      - Cluster__WriteQuorum=2
      - Cluster__ReadQuorum=1
      - "Cluster__Nodes__0__NodeId=node-1"
      - "Cluster__Nodes__0__Address=http://dotbucket-1:9000"
      - "Cluster__Nodes__1__NodeId=node-2"
      - "Cluster__Nodes__1__Address=http://dotbucket-2:9000"
      - "Cluster__Nodes__2__NodeId=node-3"
      - "Cluster__Nodes__2__Address=http://dotbucket-3:9000"
      - Storage__MasterKey=${DOTBUCKET_MASTER_KEY:?Set DOTBUCKET_MASTER_KEY}
    networks:
      - dotbucket-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  dotbucket-3:
    build: .
    container_name: dotbucket-3
    ports:
      - "9003:9000"
    volumes:
      - dotbucket-data-3:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Auth__AdminToken=${DOTBUCKET_ADMIN_TOKEN:?Set DOTBUCKET_ADMIN_TOKEN}
      - Auth__RootAccessKey=${DOTBUCKET_ROOT_ACCESS_KEY:?Set DOTBUCKET_ROOT_ACCESS_KEY}
      - Auth__RootSecretKey=${DOTBUCKET_ROOT_SECRET_KEY:?Set DOTBUCKET_ROOT_SECRET_KEY}
      - Cluster__Enabled=true
      - Cluster__NodeId=node-3
      - Cluster__AdvertiseAddress=http://dotbucket-3:9000
      - Cluster__LeaderNodeId=node-1
      - Cluster__ClusterToken=${DOTBUCKET_CLUSTER_TOKEN:?Set DOTBUCKET_CLUSTER_TOKEN}
      - Cluster__ReplicationFactor=3
      - Cluster__WriteQuorum=2
      - Cluster__ReadQuorum=1
      - "Cluster__Nodes__0__NodeId=node-1"
      - "Cluster__Nodes__0__Address=http://dotbucket-1:9000"
      - "Cluster__Nodes__1__NodeId=node-2"
      - "Cluster__Nodes__1__Address=http://dotbucket-2:9000"
      - "Cluster__Nodes__2__NodeId=node-3"
      - "Cluster__Nodes__2__Address=http://dotbucket-3:9000"
      - Storage__MasterKey=${DOTBUCKET_MASTER_KEY:?Set DOTBUCKET_MASTER_KEY}
    networks:
      - dotbucket-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dotbucket-net:
    driver: bridge

volumes:
  dotbucket-data-1:
  dotbucket-data-2:
  dotbucket-data-3: